<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>Минимум</title>
  <meta name="description" content="Личный трекер ежедневного минимума">
  <meta name="theme-color" media="(prefers-color-scheme: light)" content="#f4f4f2">
  <meta name="theme-color" media="(prefers-color-scheme: dark)" content="#131417">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Минимум">
  <link rel="manifest" href="./manifest.json">
  <link rel="apple-touch-icon" href="./icon-180.png">
  <link rel="icon" type="image/png" sizes="192x192" href="./icon-192.png">
  <link rel="stylesheet" href="./styles.css">
</head>
<body>
  <main>
    <section class="screen" id="scr-today"></section>
    <section class="screen" id="scr-habits" hidden></section>
    <section class="screen" id="scr-review" hidden></section>
    <section class="screen" id="scr-items" hidden></section>
    <section class="screen" id="scr-system" hidden></section>

  <nav id="tabs" aria-label="Разделы">
    <button data-tab="today" aria-current="page">Сегодня</button>
    <button data-tab="habits">Привычки</button>
    <button data-tab="system">Система</button>
    <button data-tab="review">Разбор</button>
    <button data-tab="items">Пункты</button>
  </nav>

  <script src="./app.js"></script>
